upstream lattice {
    server app:3000;
}

limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name _;

    location = /healthz {
        return 204;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Keep request sizes aligned with the small JSON API and WebSocket handshake.
    client_max_body_size 16k;
    client_body_buffer_size 16k;
    large_client_header_buffers 2 8k;

    # Cloudflare IP ranges (https://www.cloudflare.com/ips/)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    include /etc/nginx/conf.d/security-headers.conf;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm text/xml image/svg+xml;
    gzip_min_length 256;

    # Static assets (immutable hashed filenames from Vite)
    location /assets/ {
        proxy_pass http://lattice;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # WASM bindings (filenames are not content-hashed, so cache but always revalidate)
    location /generated/ {
        proxy_pass http://lattice;
        add_header Cache-Control "public, no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # WebSocket endpoint — long timeout for chat sessions
    location /api/v1/ws {
        client_max_body_size 1k;

        proxy_pass http://lattice;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Match server SESSION_TTL (30 min)
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # API routes — rate limited
    location /api/ {
        client_max_body_size 16k;

        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://lattice;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Everything else (HTML pages)
    location / {
        client_max_body_size 8k;

        proxy_pass http://lattice;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
